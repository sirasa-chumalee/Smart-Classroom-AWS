<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f2f2f0;
        }
        .main-card {
            background-color: #ffffff;
            padding: 50px;
            display: flex;
            align-items: center;
            flex-direction:column;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .08);
        }
        .logo {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 50px; 
        }
        .btn-row {
            display: flex;
            gap:20px;
        }
        .go-btn {
            flex: 1;
            padding:18px 22px;
            border-radius:14px; border:1.5px solid #e0dfd9;
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center;  gap: 8px;
            background-color: #f2f2f0;
            font-family:'Times New Roman', Times, serif; 
            font-size:15px; font-weight:700;
            transition:all .15s;
        }
        .go-btn:hover {
            border-color: #00284D;
            background-color: #00284D;
            color: white;
            transform:translateY(-3px);
            box-shadow:0 6px 20px rgba(0,0,0,.12);
        }
        .desc {
            padding: 10px 0px 30px 0px;
        }
        .role {
            /* background-color: pink; */
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- <div class="header"> -->
            <!-- Name of "web app" -->
            <div class="logo">Checker</div>

            <div class="desc"> Choose a role to log in to</div>            
        <!-- </div> -->


        <div class="btn-row">
            <button class="go-btn" id="role-button">
                <span><i data-lucide="graduation-cap" stroke-width="2"></i> </span>
                <span class="role">Student</span>
            </button>

            <button class="go-btn" id="role-button">
                <span><i data-lucide="library-big" stroke-width="2"></i> </span>
                <span class="role">Teacher</span>
            </button>
        </div>

    </div>
    <script>
        // Redirect to student or dashboard when press role button
        document.addEventListener("DOMContentLoaded", () => {
            const button = document.querySelectorAll(".go-btn");

            button.forEach(button => {
                button.addEventListener('click', (e) => {
                    const role = button.querySelector(".role").innerHTML;

                    if (role === "Student") {
                        window.location.href = "student.html";
                    } else {
                        window.location.href = "dashboard.html";
                    }
                });
            });
        });
    </script>


    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
