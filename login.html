<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #00284D;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        .big-shape {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }
        .shape1 {
            background: #4facfe81;
            top: 10%;
            left: 10%;
        }
        .shape2 {
            background: #23c8ff84;
            bottom: 10%;
            right: 20%;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
            100% { transform: translateY(0px); }
        }

        .shape1, .shape2 {
            animation: float 6s ease-in-out infinite;
        }
        .main-card {
            position: relative;
            background-color: #ffffff;
            padding: 50px;
            display: flex;
            align-items: center;
            flex-direction:column;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            z-index: 1;
        }
        .logo {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 50px; 
        }
        .btn-row {
            display: flex;
            gap:20px;
        }
        .go-btn {
            flex: 1;
            padding:18px 22px;
            border-radius:14px; border:1.5px solid #e0dfd9;
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center;  gap: 8px;
            background-color: #f2f2f0;
            font-family:'Times New Roman', Times, serif; 
            font-size:15px; font-weight:700;
            transition:all .15s;
        }
        .go-btn:hover {
            border-color: #00284D;
            background-color: #00284D;
            color: white;
            transform:translateY(-3px);
            box-shadow:0 6px 20px rgba(0,0,0,.12);
        }
        .desc {
            padding-top: 10px;
            padding-bottom: 50px;
        }
        .clipboard-clock, .notebook {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>
    <div class="big-shape shape1"></div>
    <div class="big-shape shape2"></div>

    <div class="main-card">
        <!-- <div class="header"> -->
            <!-- Name of "web app" -->
            <div class="logo">Checkly</div>

            <div class="desc"> Choose a role to log in to</div>            
        <!-- </div> -->


        <div class="btn-row">
            <button class="go-btn" id="role-button">
                <span><i data-lucide="notebook" stroke-width="1.75" class="notebook"></i> </span>
                <span class="role">Student</span>
            </button>

            <button class="go-btn" id="role-button">
                <span><i data-lucide="clipboard-clock" stroke-width="1.75" class="clipboard-clock"></i> </span>
                <span class="role">Teacher</span>
            </button>
        </div>

    </div>
    <script>
        // Redirect to student or dashboard when press role button
        document.addEventListener("DOMContentLoaded", () => {
            const button = document.querySelectorAll(".go-btn");

            button.forEach(button => {
                button.addEventListener('click', (e) => {
                    const role = button.querySelector(".role").innerHTML;

                    if (role === "Student") {
                        window.location.href = "student.html";
                    } else {
                        window.location.href = "dashboard.html";
                    }
                });
            });
        });
    </script>


    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
