<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-card {
            padding: 50px;
            display: flex;
            align-items: center;
            flex-direction:column;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .08);
        }
        .logo {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size:x-large;
        }
        .btn-row {
            display: flex;
            gap:12px;
        }
        .go-btn {
            flex: 1;
        }
        .go-btn button {
            border: none;
            padding: 30px;
        }
        .desc {
            padding: 10px 0px 30px 0px;
        }
        .role {
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- <div class="header"> -->
            <!-- Name of "web app" -->
            <div class="logo">Checker</div>

            <div class="desc"> Choose a role to log in to</div>            
        <!-- </div> -->


        <div class="btn-row">
            <button class="go-btn" id="role-button">
                <span class="role">Student</span>
            </button>

            <button class="go-btn" id="role-button">
                <span class="role">Teacher</span>
            </button>
        </div>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const button = document.querySelectorAll(".go-btn");

            button.forEach(button => {
                button.addEventListener('click', (e) => {
                    const role = button.querySelector(".role").innerHTML;

                    if (role === "Student") {
                        window.location.href = "student.html";
                    } else {
                        window.location.href = "dashboard.html";
                    }
                });
            });
        });
    </script>
</body>
</html>
