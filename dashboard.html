<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA Dashboard</title>
      <link rel="stylesheet" href="css/common.css" />
      <link rel="stylesheet" href="css/grader.css" />
</head>
<body>
    
<!-- ── Sidebar ──────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-brand">Grader</div>
  <div class="sidebar-icons">
    <button class="s-icon active" title="Submissions">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="plus-btn" title="Create Lab" onclick="openCreateModal()">+</button>
  </div>
  <div class="sidebar-footer">
    <div class="ta-lbl" id="ta-lbl">TA ID</div>
    <button class="s-icon" title="Sign Out" onclick="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────── -->
<main class="main">

  <div class="filter-bar">
    <select class="f-select" id="f-lab">
      <option value="">Choose Lab</option>
      <option>Lab 1</option><option>Lab 2</option>
      <option>Lab 3</option><option>Lab 4</option>
    </select>
    <select class="f-select" id="f-status">
      <option value="">Choose Status</option>
      <option>Graded</option><option>Processing</option>
      <option>Failed</option><option>Pending</option>
    </select>
    <div class="f-search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="f-input" id="f-search" type="text" placeholder="Search student ID…" />
    </div>
    <button class="btn-primary" style="padding:9px 20px;font-size:13px;" onclick="applyFilter()">Filter</button>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Lab ID</th><th>Student ID</th><th>Submitted At</th>
          <th>Status</th><th>Score</th><th>CI Score</th><th></th>
        </tr>
      </thead>
      <tbody id="sub-tbody"></tbody>
    </table>
  </div>

</main>

<!-- ── Edit Submission Modal ────────────────────── -->
<div class="backdrop" id="backdrop-edit">
  <div class="modal">
    <button class="modal-close" onclick="closeBackdrop('backdrop-edit')">✕</button>
    <div class="modal-title" id="edit-title">Lab xx</div>

    <label class="field-label">Attachments</label>
    <div id="edit-attachments"></div>

    <label class="field-label">Submission</label>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <span style="font-family:var(--mono);font-size:12px;color:var(--muted);">Status :</span>
      <span class="badge" id="edit-badge"></span>
    </div>

    <div class="score-box">
      <div class="score-row">
        <span class="score-lbl">Score</span>
        <input class="score-inp" type="number" id="edit-score" min="0" max="100" placeholder="–" />
        <span style="font-family:var(--mono);font-size:13px;color:var(--muted);">/100</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-outline" onclick="closeBackdrop('backdrop-edit')">Cancel</button>
      <button class="btn-primary" id="btn-save-grade" onclick="saveGrade()">Save</button>
    </div>
  </div>
</div>

<!-- ── Create Lab Modal ──────────────────────────── -->
<div class="backdrop" id="backdrop-create">
  <div class="modal">
    <button class="modal-close" onclick="closeBackdrop('backdrop-create')">✕</button>
    <div class="modal-title" id="create-title">Lab x</div>

    <label class="field-label">Assignment Description</label>
    <div class="desc-box">
      <textarea id="new-desc" placeholder="Describe the lab instructions…"></textarea>
    </div>

    <label class="field-label" style="margin-top:14px;">Keywords to Detect</label>
    <input class="text-input" id="new-keywords" type="text" placeholder="e.g. enabled, 30days, active" />
    <div class="field-hint">Rekognition / Textract scans submitted screenshots for these words</div>

    <div style="margin-top:16px;">
      <div class="dropzone" id="create-dropzone"
           onclick="document.getElementById('create-file-inp').click()"
           ondragover="event.preventDefault();this.classList.add('over')"
           ondragleave="this.classList.remove('over')"
           ondrop="event.preventDefault();setCreateFile(event.dataTransfer.files[0])">
        <div class="dz-icon">⬆</div>
        <div class="dz-main">Drag and drop files here or <a style="text-decoration:underline;cursor:pointer;">BROWSE</a></div>
        <div class="dz-sub">Supports PNG, JPEG, PDF</div>
      </div>
      <input type="file" id="create-file-inp" accept="image/*,.pdf" style="display:none"
             onchange="setCreateFile(this.files[0])" />
      <div id="create-file-chip"></div>
    </div>

    <div class="settings-row">
      <div class="settings-col">
        <label class="field-label" style="font-size:13px;">Assignment Settings</label>
        <div class="radio-group">
          <label class="r-opt"><input type="radio" name="grading" value="ungraded" /> Ungraded</label>
          <label class="r-opt"><input type="radio" name="grading" value="points" checked /> Points</label>
          <input class="pts-inp" type="number" id="new-points" value="100" />
        </div>
      </div>
      <div class="settings-col">
        <label class="field-label" style="font-size:13px;">Due Date</label>
        <div class="radio-group">
          <label class="r-opt"><input type="radio" name="due" value="none" checked /> No due date</label>
          <label class="r-opt"><input type="radio" name="due" value="date" /> Date &amp; Time 📅</label>
        </div>
        <input type="datetime-local" id="new-due" class="text-input"
               style="display:none;margin-top:8px;font-family:var(--mono);font-size:12px;" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-outline" onclick="closeBackdrop('backdrop-create')">Cancel</button>
      <button class="btn-primary" id="btn-post-lab" onclick="postLab()">Post</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
